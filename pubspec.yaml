name: campusgig
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0

  # State Management
  flutter_riverpod: ^2.5.1
  flutter_hooks: ^0.21.1

  # Navigation
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.2.1
  lucide_icons: any
  intl: ^0.19.0
  animate_do: ^3.3.4
  url_launcher: ^6.3.2
  shared_preferences: ^2.3.2
  file_picker: any
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
